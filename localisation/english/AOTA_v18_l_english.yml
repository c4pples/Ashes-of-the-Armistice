 AOTA_ALG_DESC:0 "A French colonial administration balancing coercion, settler politics, and rising unrest."
 AOTA_COG_DESC:0 "A brittle colonial administration ruling a vast central African possession by force, custom, and extraction."
 AOTA_ALG_REGIME_DESC:0 "French Algeria is governed through a divided architecture of settler privilege, military policing, and cautious reformism. Every concession to representation risks undermining the coercive system that keeps the colony intact."
 AOTA_COG_REGIME_DESC:0 "The Congo Administration rests on concessionary companies, missionary patronage, and a coercive colonial bureaucracy. It can extract wealth quickly, but every region pacified by force leaves a deeper political debt."
