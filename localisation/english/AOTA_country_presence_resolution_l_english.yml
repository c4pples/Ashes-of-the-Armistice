l_english:
 aota_subordinate_administration:0 "Subordinate Administration"
 aota_subordinate_administration_desc:0 "The government is retained as a formal authority, but operates within strict strategic limits set by its patron power."
 aota_minimum_viable_statecraft:0 "Minimum Viable Statecraft"
 aota_minimum_viable_statecraft_desc:0 "A compact governing package provides enough institutions and political direction to keep this state relevant without letting it dominate regional arcs."
 aota_frontier_realignment_authority:0 "Frontier Realignment Authority"
 aota_frontier_realignment_authority_desc:0 "Frontier authorities are consolidated around local security, negotiated legitimacy, and constrained military mobilization."
 aota_limited_strategic_bandwidth:0 "Limited Strategic Bandwidth"
 aota_limited_strategic_bandwidth_desc:0 "This state maintains sovereignty but lacks the capacity for sustained expansionist policy, focusing on internal survival and regional neutrality."
 aota_buffer_state_neutrality:0 "Buffer-State Neutrality"
 aota_buffer_state_neutrality_desc:0 "Political elites prioritize neutrality and border security, avoiding entanglements that could ignite a major corridor war."

 aota_country_presence.2.t:0 "Administrative Consolidation"
 aota_country_presence.2.d:0 "Our government has approved a pragmatic reform package to ensure we remain a meaningful regional actor rather than a hollow, destabilizing placeholder."
 aota_country_presence.2.a:0 "Build a durable state apparatus."
 aota_country_presence.3.t:0 "Neutral Posture Confirmed"
 aota_country_presence.3.d:0 "Our cabinet has ratified a constrained doctrine: sovereignty will be defended, but reckless adventurism is off the table."
 aota_country_presence.3.a:0 "Keep the peace."

 AOTA_country_presence_statecraft_category:0 "Regional Statecraft Program"
 AOTA_country_presence_statecraft_category_desc:0 "A focused set of reforms and diplomatic choices keeps the country politically coherent and regionally relevant."
 AOTA_presence_regional_compact:0 "Negotiate a Regional Compact"
 AOTA_presence_regional_compact_desc:0 "Stabilize our diplomatic environment through a limited set of agreements that lower escalation pressure."
 AOTA_presence_internal_security_reform:0 "Internal Security Reform"
 AOTA_presence_internal_security_reform_desc:0 "Strengthen internal institutions before external pressure turns local disputes into national crises."
 AOTA_presence_limited_rearmament:0 "Limited Rearmament Program"
 AOTA_presence_limited_rearmament_desc:0 "Modernize selected forces for deterrence while avoiding full-scale militarist drift."

 AOTA_country_presence_background_category:0 "Background Stability Measures"
 AOTA_country_presence_background_category_desc:0 "These decisions keep the state coherent and calm while preserving its role as regional texture rather than a campaign-defining aggressor."
 AOTA_presence_reaffirm_neutrality:0 "Reaffirm Neutrality"
 AOTA_presence_reaffirm_neutrality_desc:0 "Issue a formal neutrality doctrine to limit diplomatic escalation."
 AOTA_presence_border_patrol_protocols:0 "Border Patrol Protocols"
 AOTA_presence_border_patrol_protocols_desc:0 "Improve border management and readiness without entering an offensive planning cycle."
